openapi: 3.0.3
info:
  title: Role Management API
  version: "1.0"
  description: Define and assign roles for permission-based access control. Roles aggregate permissions derived from resource server scopes and can be assigned directly to users or groups.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{host}:{port}
    variables:
      host:
        default: "localhost"
      port:
        default: "8090"

tags:
  - name: Roles
    description: Create roles, define their permission scopes, and assign them to users or groups.

security:
  - OAuth2: [system]

paths:
  /roles:
    get:
      tags:
        - Roles
      summary: List roles
      parameters:
        - $ref: '#/components/parameters/limitQueryParam'
        - $ref: '#/components/parameters/offsetQueryParam'
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
              example:
                totalResults: 5
                startIndex: 1
                count: 2
                roles:
                  - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: "front-desk-agent"
                    description: "Front desk agent role with booking and customer management permissions"
                    ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                    ouHandle: "default"
                    isReadOnly: false
                  - id: "257e528f-eb24-48b6-884d-20460e190957"
                    name: "hotel-manager"
                    description: "Hotel manager with full property access"
                    ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                    ouHandle: "default"
                    isReadOnly: true
                links:
                  - href: "roles?offset=2&limit=2"
                    rel: "next"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "ROL-1001"
                    message:
                      key: "error.roleservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-limit:
                  summary: Invalid limit parameter
                  value:
                    code: "ROL-1008"
                    message:
                      key: "error.roleservice.invalid_limit_parameter"
                      defaultValue: "Invalid limit parameter"
                    description:
                      key: "error.roleservice.invalid_limit_parameter_description"
                      defaultValue: "The limit parameter must be a positive integer"
                invalid-offset:
                  summary: Invalid offset parameter
                  value:
                    code: "ROL-1009"
                    message:
                      key: "error.roleservice.invalid_offset_parameter"
                      defaultValue: "Invalid offset parameter"
                    description:
                      key: "error.roleservice.invalid_offset_parameter_description"
                      defaultValue: "The offset parameter must be a non-negative integer"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

    post:
      tags:
        - Roles
      summary: Create a new role
      description: Creates a new role with optional initial permissions and assignments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
            example:
              name: "front-desk-agent"
              description: "Front desk agent role with booking and customer management permissions"
              ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
              permissions:
                - resourceServerId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  permissions:
                    - "create_reservation"
                    - "view_reservation"
                    - "update_reservation"
                    - "check_in_guest"
                    - "check_out_guest"
                - resourceServerId: "7b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e"
                  permissions:
                    - "process_payment"
                    - "view_payment"
                    - "view_customer_profile"
                    - "update_customer_profile"
              assignments:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                - type: "group"
                  id: "6b1e7b8d-7e19-41eb-8fa2-c0ee5bb67a94"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleWithAssignments'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "front-desk-agent"
                description: "Front desk agent role with booking and customer management permissions"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                ouHandle: "default"
                permissions:
                  - resourceServerId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    permissions:
                      - "create_reservation"
                      - "view_reservation"
                      - "update_reservation"
                      - "check_in_guest"
                      - "check_out_guest"
                  - resourceServerId: "7b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e"
                    permissions:
                      - "process_payment"
                      - "view_payment"
                      - "view_customer_profile"
                      - "update_customer_profile"
                assignments:
                  - type: "user"
                    id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                    display: "John Doe"
                  - type: "group"
                    id: "6b1e7b8d-7e19-41eb-8fa2-c0ee5bb67a94"
                    display: "Front Desk Team"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "ROL-1001"
                    message:
                      key: "error.roleservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-assignment-id:
                  summary: Invalid assignment ID
                  value:
                    code: "ROL-1007"
                    message:
                      key: "error.roleservice.invalid_assignment_id"
                      defaultValue: "Invalid assignment ID"
                    description:
                      key: "error.roleservice.invalid_assignment_id_description"
                      defaultValue: "One or more assignment IDs in the request do not exist or do not match the claimed type"
                ou-not-found:
                  summary: Organization unit not found
                  value:
                    code: "ROL-1005"
                    message:
                      key: "error.roleservice.organization_unit_not_found"
                      defaultValue: "Organization unit not found"
                    description:
                      key: "error.roleservice.organization_unit_not_found_description"
                      defaultValue: "Organization unit not found"
                invalid-permissions:
                  summary: Invalid permissions
                  value:
                    code: "ROL-1012"
                    message:
                      key: "error.roleservice.invalid_permissions"
                      defaultValue: "Invalid permissions"
                    description:
                      key: "error.roleservice.invalid_permissions_description"
                      defaultValue: "One or more permissions do not exist in the resource management system"
                declarative-mode:
                  summary: Role creation not allowed in declarative-only mode
                  value:
                    code: "ROL-1015"
                    message:
                      key: "error.roleservice.cannot_create_role_in_declarative_only_mode"
                      defaultValue: "Cannot create role in declarative-only mode"
                    description:
                      key: "error.roleservice.cannot_create_role_in_declarative_only_mode_description"
                      defaultValue: "Role creation is not allowed when running in declarative-only mode. Roles must be defined in declarative configuration files"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1004"
                message:
                  key: "error.roleservice.role_name_conflict"
                  defaultValue: "Role name conflict"
                description:
                  key: "error.roleservice.role_name_conflict_description"
                  defaultValue: "A role with the same name exists under the same organization unit"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

  /roles/{id}:
    get:
      tags:
        - Roles
      summary: Get role details
      description: Returns role metadata with permissions list
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "front-desk-agent"
                description: "Front desk agent role with booking and customer management permissions"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                ouHandle: "default"
                permissions:
                  - resourceServerId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    permissions:
                      - "create_reservation"
                      - "view_reservation"
                  - resourceServerId: "7b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e"
                    permissions:
                      - "process_payment"
                      - "view_customer_profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1002"
                message:
                  key: "error.roleservice.missing_role_id"
                  defaultValue: "Invalid request format"
                description:
                  key: "error.roleservice.missing_role_id_description"
                  defaultValue: "Role ID is required"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1003"
                message:
                  key: "error.roleservice.role_not_found"
                  defaultValue: "Role not found"
                description:
                  key: "error.roleservice.role_not_found_description"
                  defaultValue: "The role with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

    put:
      tags:
        - Roles
      summary: Update role
      description: Updates role name, description, organization unit, and permissions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
            example:
              name: "senior-front-desk-agent"
              description: "Senior front desk agent with additional permissions"
              ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
              permissions:
                - resourceServerId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  permissions:
                    - "create_reservation"
                    - "view_reservation"
                    - "update_reservation"
                    - "cancel_reservation"
                - resourceServerId: "7b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e"
                  permissions:
                    - "process_payment"
                    - "view_payment"
                    - "refund_payment"
                    - "view_customer_profile"
                    - "update_customer_profile"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "senior-front-desk-agent"
                description: "Senior front desk agent with additional permissions"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                ouHandle: "default"
                permissions:
                  - resourceServerId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    permissions:
                      - "create_reservation"
                      - "view_reservation"
                      - "update_reservation"
                      - "cancel_reservation"
                  - resourceServerId: "7b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e"
                    permissions:
                      - "process_payment"
                      - "view_payment"
                      - "refund_payment"
                      - "view_customer_profile"
                      - "update_customer_profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing-role-id:
                  summary: Missing role ID
                  value:
                    code: "ROL-1002"
                    message:
                      key: "error.roleservice.missing_role_id"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.missing_role_id_description"
                      defaultValue: "Role ID is required"
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "ROL-1001"
                    message:
                      key: "error.roleservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                ou-not-found:
                  summary: Organization unit not found
                  value:
                    code: "ROL-1005"
                    message:
                      key: "error.roleservice.organization_unit_not_found"
                      defaultValue: "Organization unit not found"
                    description:
                      key: "error.roleservice.organization_unit_not_found_description"
                      defaultValue: "Organization unit not found"
                invalid-permissions:
                  summary: Invalid permissions
                  value:
                    code: "ROL-1012"
                    message:
                      key: "error.roleservice.invalid_permissions"
                      defaultValue: "Invalid permissions"
                    description:
                      key: "error.roleservice.invalid_permissions_description"
                      defaultValue: "One or more permissions do not exist in the resource management system"
                immutable-role:
                  summary: Cannot modify declarative role
                  value:
                    code: "ROL-1013"
                    message:
                      key: "error.roleservice.cannot_modify_declarative_role"
                      defaultValue: "Cannot modify declarative role"
                    description:
                      key: "error.roleservice.cannot_modify_declarative_role_description"
                      defaultValue: "The role is defined in declarative configuration and cannot be modified"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1003"
                message:
                  key: "error.roleservice.role_not_found"
                  defaultValue: "Role not found"
                description:
                  key: "error.roleservice.role_not_found_description"
                  defaultValue: "The role with the specified id does not exist"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1004"
                message:
                  key: "error.roleservice.role_name_conflict"
                  defaultValue: "Role name conflict"
                description:
                  key: "error.roleservice.role_name_conflict_description"
                  defaultValue: "A role with the same name exists under the same organization unit"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

    delete:
      tags:
        - Roles
      summary: Delete a role by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role deleted
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing-role-id:
                  summary: Missing role ID
                  value:
                    code: "ROL-1002"
                    message:
                      key: "error.roleservice.missing_role_id"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.missing_role_id_description"
                      defaultValue: "Role ID is required"
                cannot-delete-role:
                  summary: Cannot delete role
                  value:
                    code: "ROL-1006"
                    message:
                      key: "error.roleservice.cannot_delete_role"
                      defaultValue: "Cannot delete role"
                    description:
                      key: "error.roleservice.cannot_delete_role_description"
                      defaultValue: "Cannot delete role that is currently assigned to users or groups"
                immutable-role:
                  summary: Cannot modify declarative role
                  value:
                    code: "ROL-1013"
                    message:
                      key: "error.roleservice.cannot_modify_declarative_role"
                      defaultValue: "Cannot modify declarative role"
                    description:
                      key: "error.roleservice.cannot_modify_declarative_role_description"
                      defaultValue: "The role is defined in declarative configuration and cannot be modified"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1003"
                message:
                  key: "error.roleservice.role_not_found"
                  defaultValue: "Role not found"
                description:
                  key: "error.roleservice.role_not_found_description"
                  defaultValue: "The role with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

  /roles/{id}/assignments:
    get:
      tags:
        - Roles
      summary: Get role assignments
      description: Returns user and group assignments for the role. Use type to filter by assignee type and include=display to get display names.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/assigneeTypeQueryParam'
        - $ref: '#/components/parameters/includeQueryParam'
        - $ref: '#/components/parameters/limitQueryParam'
        - $ref: '#/components/parameters/offsetQueryParam'
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentListResponse'
              examples:
                without-display:
                  summary: Without include parameter (IDs and types only)
                  value:
                    totalResults: 5
                    startIndex: 1
                    count: 2
                    assignments:
                      - type: "user"
                        id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                      - type: "group"
                        id: "8c2f8e9e-8f2a-4f5b-9c3d-4e5f6a7b8c9d"
                    links:
                      - href: "roles/3fa85f64-5717-4562-b3fc-2c963f66afa6/assignments?offset=2&limit=2"
                        rel: "next"
                with-display:
                  summary: With include=display parameter
                  value:
                    totalResults: 5
                    startIndex: 1
                    count: 2
                    assignments:
                      - type: "user"
                        id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                        display: "John Doe"
                      - type: "group"
                        id: "8c2f8e9e-8f2a-4f5b-9c3d-4e5f6a7b8c9d"
                        display: "Front Desk Team"
                    links:
                      - href: "roles/3fa85f64-5717-4562-b3fc-2c963f66afa6/assignments?offset=2&limit=2"
                        rel: "next"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-type:
                  summary: Invalid assignee type parameter
                  value:
                    code: "ROL-1016"
                    message:
                      key: "error.roleservice.invalid_assignee_type"
                      defaultValue: "Invalid assignee type"
                    description:
                      key: "error.roleservice.invalid_assignee_type_description"
                      defaultValue: "The type parameter must be 'user', 'group', or 'app'"
                invalid-limit:
                  summary: Invalid limit parameter
                  value:
                    code: "ROL-1008"
                    message:
                      key: "error.roleservice.invalid_limit_parameter"
                      defaultValue: "Invalid limit parameter"
                    description:
                      key: "error.roleservice.invalid_limit_parameter_description"
                      defaultValue: "The limit parameter must be a positive integer"
                invalid-offset:
                  summary: Invalid offset parameter
                  value:
                    code: "ROL-1009"
                    message:
                      key: "error.roleservice.invalid_offset_parameter"
                      defaultValue: "Invalid offset parameter"
                    description:
                      key: "error.roleservice.invalid_offset_parameter_description"
                      defaultValue: "The offset parameter must be a non-negative integer"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1003"
                message:
                  key: "error.roleservice.role_not_found"
                  defaultValue: "Role not found"
                description:
                  key: "error.roleservice.role_not_found_description"
                  defaultValue: "The role with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

  /roles/{id}/assignments/add:
    post:
      tags:
        - Roles
      summary: Add assignments to a role
      description: Adds one or more user or group assignments to the specified role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentsRequest'
            example:
              assignments:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                - type: "group"
                  id: "6b1e7b8d-7e19-41eb-8fa2-c0ee5bb67a94"
      responses:
        "204":
          description: Assignments added successfully
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "ROL-1001"
                    message:
                      key: "error.roleservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-assignment-id:
                  summary: Invalid assignment ID
                  value:
                    code: "ROL-1007"
                    message:
                      key: "error.roleservice.invalid_assignment_id"
                      defaultValue: "Invalid assignment ID"
                    description:
                      key: "error.roleservice.invalid_assignment_id_description"
                      defaultValue: "One or more assignment IDs in the request do not exist or do not match the claimed type"
                empty-assignments:
                  summary: Empty assignments
                  value:
                    code: "ROL-1010"
                    message:
                      key: "error.roleservice.empty_assignments_list"
                      defaultValue: "Empty assignments list"
                    description:
                      key: "error.roleservice.empty_assignments_list_description"
                      defaultValue: "At least one assignment must be provided"
                immutable-assignment:
                  summary: Cannot modify declarative assignment
                  value:
                    code: "ROL-1014"
                    message:
                      key: "error.roleservice.cannot_modify_declarative_assignment"
                      defaultValue: "Cannot modify declarative assignment"
                    description:
                      key: "error.roleservice.cannot_modify_declarative_assignment_description"
                      defaultValue: "The assignment is defined in declarative configuration and cannot be modified"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1003"
                message:
                  key: "error.roleservice.role_not_found"
                  defaultValue: "Role not found"
                description:
                  key: "error.roleservice.role_not_found_description"
                  defaultValue: "The role with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

  /roles/{id}/assignments/remove:
    post:
      tags:
        - Roles
      summary: Remove assignments from a role
      description: Removes one or more user or group assignments from the specified role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentsRequest'
            example:
              assignments:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                - type: "group"
                  id: "6b1e7b8d-7e19-41eb-8fa2-c0ee5bb67a94"
      responses:
        "204":
          description: Assignments removed successfully
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "ROL-1001"
                    message:
                      key: "error.roleservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.roleservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                empty-assignments:
                  summary: Empty assignments
                  value:
                    code: "ROL-1010"
                    message:
                      key: "error.roleservice.empty_assignments_list"
                      defaultValue: "Empty assignments list"
                    description:
                      key: "error.roleservice.empty_assignments_list_description"
                      defaultValue: "At least one assignment must be provided"
                immutable-assignment:
                  summary: Cannot modify declarative assignment
                  value:
                    code: "ROL-1014"
                    message:
                      key: "error.roleservice.cannot_modify_declarative_assignment"
                      defaultValue: "Cannot modify declarative assignment"
                    description:
                      key: "error.roleservice.cannot_modify_declarative_assignment_description"
                      defaultValue: "The assignment is defined in declarative configuration and cannot be modified"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-1003"
                message:
                  key: "error.roleservice.role_not_found"
                  defaultValue: "Role not found"
                description:
                  key: "error.roleservice.role_not_found_description"
                  defaultValue: "The role with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ROL-5000"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://localhost:8090/oauth2/authorize
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs
        clientCredentials:
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs

  parameters:
    limitQueryParam:
      in: query
      name: limit
      required: false
      description: |
        Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
        default: 30
    offsetQueryParam:
      in: query
      name: offset
      required: false
      description: |
        Number of records to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0
    assigneeTypeQueryParam:
      in: query
      name: type
      required: false
      schema:
        type: string
        enum:
          - user
          - group
          - app
          - agent
      description: |
        Filter assignments by assignee type. When omitted, assignments of all types are returned.
    includeQueryParam:
      in: query
      name: include
      required: false
      schema:
        type: string
        enum:
          - display
      description: |
        Optional parameter to include additional information.
        - `display` - Include display names for users and groups. For users, the display value is resolved from the schema-configured display attribute (`systemAttributes.display`). Falls back to the user ID if no display attribute is configured, the configured attribute path does not exist in the user's data, or the attribute value is empty. For groups, the group name is used.

  schemas:
    Assignment:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
          format: uuid
          description: "ID of the user, app, agent, or group being assigned"
        type:
          type: string
          enum:
            - user
            - group
            - app
            - agent
          description: "Type of entity being assigned (user, app, agent, or group)"
        display:
          type: string
          readOnly: true
          description: "Display name of the user or group (only included when include=display query parameter is used). For users, resolved from the schema-configured display attribute; falls back to the user ID if the attribute is not configured, the path does not exist, or the value is empty. For groups, the group name is used."

    AssignmentInput:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
          format: uuid
          description: "ID of the user, app, agent, or group being assigned"
        type:
          type: string
          enum:
            - user
            - group
            - app
            - agent
          description: "Type of entity being assigned (user, app, agent, or group)"

    ResourcePermissions:
      type: object
      required: [resourceServerId, permissions]
      properties:
        resourceServerId:
          type: string
          format: uuid
          description: "ID of the resource server these permissions belong to"
        permissions:
          type: array
          items:
            type: string
          description: "List of permission strings for this resource server"

    RoleSummary:
      type: object
      required: [id, name, ouId]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique identifier for the role"
        name:
          type: string
          description: "Name of the role"
        description:
          type: string
          nullable: true
          description: "Optional description of the role"
        ouId:
          type: string
          format: uuid
          description: "ID of the organization unit this role belongs to"
        ouHandle:
          type: string
          readOnly: true
          description: "Handle of the organization unit this role belongs to"
        isReadOnly:
          type: boolean
          readOnly: true
          description: "Indicates if the role is defined in declarative configuration and cannot be modified"

    Role:
      type: object
      required: [id, name, ouId, permissions]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique identifier for the role"
        name:
          type: string
          description: "Name of the role"
        description:
          type: string
          nullable: true
          description: "Optional description of the role"
        ouId:
          type: string
          format: uuid
          description: "ID of the organization unit this role belongs to"
        ouHandle:
          type: string
          readOnly: true
          description: "Handle of the organization unit this role belongs to"
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/ResourcePermissions'
          description: "List of resource permissions grouped by resource server"

    RoleWithAssignments:
      allOf:
        - $ref: '#/components/schemas/Role'
        - type: object
          properties:
            assignments:
              type: array
              items:
                $ref: '#/components/schemas/Assignment'
              description: "List of user and group assignments with display names"

    CreateRoleRequest:
      type: object
      required: [name, ouId]
      properties:
        name:
          type: string
          description: "Name of the role"
        description:
          type: string
          description: "Optional description of the role"
        ouId:
          type: string
          format: uuid
          description: "ID of the organization unit this role belongs to"
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/ResourcePermissions'
          description: "Optional list of initial permissions grouped by resource server"
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/AssignmentInput'
          description: "Optional list of initial user and group assignments"

    UpdateRoleRequest:
      type: object
      required: [name, ouId, permissions]
      properties:
        name:
          type: string
          description: "Name of the role"
        description:
          type: string
          description: "Optional description of the role"
        ouId:
          type: string
          format: uuid
          description: "ID of the organization unit this role belongs to"
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/ResourcePermissions'
          description: "List of resource permissions grouped by resource server"

    AssignmentsRequest:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/AssignmentInput'
          description: "List of user and group assignments"

    RoleListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: "Number of results that match the listing operation."
          example: 8
        startIndex:
          type: integer
          description: "Index of the first element of the page, which will be equal to offset + 1."
          example: 1
        count:
          type: integer
          description: "Number of elements in the returned page."
          example: 5
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleSummary'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    AssignmentListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: "Number of results that match the listing operation."
          example: 20
        startIndex:
          type: integer
          description: "Index of the first element of the page, which will be equal to offset + 1."
          example: 1
        count:
          type: integer
          description: "Number of elements in the returned page."
          example: 10
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/Assignment'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    Link:
      type: object
      properties:
        href:
          type: string
          example: "roles?offset=20&limit=10"
        rel:
          type: string
          example: "next"

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: "Error code. Codes follow the ROL-XXXX convention."
          example: "ROL-1001"
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'

    I18nMessage:
      type: object
      description: Internationalized message with translation key and default value.
      required:
        - key
        - defaultValue
      properties:
        key:
          type: string
          description: Translation key for fetching localized message.
        defaultValue:
          type: string
          description: Default message in English (fallback).
