StylesPath = .vale/styles
MinAlertLevel = suggestion
Vocab = vocab

[formats]
mdx = md

[*.md]
BasedOnStyles = Vale, WSO2-IAM
spelling = yes
Vale.Spelling = warning
Vale.Terms = NO
BlockIgnores = (?s)\A---.*?---,(`[^`]*[a-zA-Z0-9._-]*\.env(\.[a-zA-Z0-9_-]+)*[^`]*`),(?s)```.*?```,(?m)^\|.*\|$

# Disable everything except spelling from Vale built-in rules
Vale.Wordiness = NO
Vale.Repetition = NO
Vale.WeaselWords = NO
Vale.PassiveVoice = NO
Vale.Readability = NO
TokenIgnores = (<(?!\!--)[^>]+>),(\!\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\[[^\]]+\]),(\[[^\]]+\]:\s+\S+),(@[a-zA-Z0-9_-]+\/[a-zA-Z0-9._-]+)

[*.mdx]
BasedOnStyles = Vale, WSO2-IAM
spelling = yes
Vale.Spelling = warning
Vale.Terms = NO
BlockIgnores = (?s)\A---.*?---,(`[^`]*[a-zA-Z0-9._-]*\.env(\.[a-zA-Z0-9_-]+)*[^`]*`),(?s)```.*?```,(?m)^\|.*\|$,(?m)^import\s.*$,(?m)^export\s.*$,(?m)^\s+[A-Za-z][A-Za-z0-9]*=.*$,(?s)<CodeBlock[^>]*>.*?</CodeBlock>

# Disable everything except spelling from Vale built-in rules
Vale.Wordiness = NO
Vale.Repetition = NO
Vale.WeaselWords = NO
Vale.PassiveVoice = NO
Vale.Readability = NO
TokenIgnores = (<[A-Z][^>]*>),(</[A-Z][^>]*>),(<(?!\!--)[^>]+>),(\!\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\[[^\]]+\]),(\[[^\]]+\]:\s+\S+),(@[a-zA-Z0-9_-]+\/[a-zA-Z0-9._/-]+),(\{`[^`]*`\})

