id: wayfinder-app
name: Wayfinder
description: Wayfinder Travel sample application
ou_id: "{{ .THUNDER_OU_ID }}"
template: web
url: http://localhost:5173
assertion:
  validity_period: 3600
allowed_user_types:
  - Person
inbound_auth_config:
  - type: oauth2
    config:
      client_id: WAYFINDER
      redirect_uris:
        - http://localhost:5173
      grant_types:
        - authorization_code
        - refresh_token
      response_types:
        - code
      token_endpoint_auth_method: none
      pkce_required: true
      public_client: true
      token:
        access_token:
          validity_period: 3600
          user_attributes:
            - given_name
            - family_name
            - email
            - groups
        id_token:
          validity_period: 3600
          user_attributes:
            - given_name
            - family_name
            - email
            - groups
