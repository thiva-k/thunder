overrides:
  openapi-to-postmanv2>ajv: 8.18.0
  ajv-draft-04>ajv: 8.18.0
  ajv-formats>ajv: 8.18.0
  flatted: 3.4.2
  picomatch: 4.0.4
  vite: 'catalog:'
  defu: 6.1.5
  axios: 1.15.2
  dompurify: 3.4.0
  follow-redirects: 1.16.0
  unhead: 2.1.13
  minimatch@>=5.0.0 <5.1.8: '>=5.1.8'
  minimatch@<3.1.4: '>=3.1.4'
  # ESLint plugin packages still require CJS-style minimatch resolution from the 3.x line.
  eslint-plugin-react>minimatch: '3.1.5'
  eslint-plugin-jsx-a11y>minimatch: '3.1.5'
  serialize-javascript: '>=7.0.5'
  webpack: '5.105.0'
  yaml: 2.8.3
  path-to-regexp: 0.1.13
  svgo: 3.3.3
  brace-expansion@>=4.0.0 <5.0.5: 5.0.5
  lodash: 4.18.1
  protobufjs: 7.5.6
  js-yaml@>=4.0.0 <4.1.1: 4.1.1

packageExtensions:
