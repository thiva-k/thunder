  i18next: 25.6.0
  jsdom: 27.0.1
  lodash-es: 4.18.1
  lucide-react: 0.545.0
  playwright: 1.58.1
  prettier: 3.6.2
  react: 19.2.3
  react-dom: 19.2.3
  react-hook-form: 7.65.0
  react-i18next: 16.0.1
  react-router: 7.12.0
  rimraf: 6.1.3
  rolldown: 1.0.0-beta.45
  rollup-plugin-visualizer: 6.0.5
  tslib: 2.8.1
  typescript: 5.9.3
  typescript-eslint: 8.57.2
  vite: npm:rolldown-vite@7.1.14
  vite-plugin-svgr: 5.2.0
